name: TikTok Username Hunter 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Start Hunting Smart
      env:
        TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        python -c "
        import time, requests, random, string, os
        TOKEN = os.environ['TOKEN']
        CHAT_ID = os.environ['CHAT_ID']
        
        try:
            requests.post(f'https://api.telegram.org/bot{TOKEN}/sendMessage', json={'chat_id': CHAT_ID, 'text': '🟢 Hunter connected to Telegram successfully!'})
        except: pass
        
        def gen():
            l = random.choice([3, 4])
            u = ''.join(random.choice(string.ascii_lowercase + string.digits + '_') for _ in range(l))
            if u.startswith('_') or u.endswith('_'): return gen()
            return u, l
            
        for _ in range(150):
            user, length = gen()
            try:
                r = requests.get(f'https://www.tiktok.com/@{user}', headers={'User-Agent': 'Mozilla/5.0'}, timeout=5)
                if r.status_code == 404:
                    msg = f'🔥 New TikTok Username Found!\n\n🎯 Type: {\"👑 3-Chars\" if length == 3 else \"⚡ 4-Chars\"}\n👤 User: @{user}\n\n🤖 Link: https://www.tiktok.com/@{user}'
                    requests.post(f'https://api.telegram.org/bot{TOKEN}/sendMessage', json={'chat_id': CHAT_ID, 'text': msg})
            except: pass
            time.sleep(0.3)
        "
